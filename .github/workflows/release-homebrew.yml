name: Release Homebrew

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-homebrew-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Derive release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="spm-dep-tracker-macos.tar.gz"
          METADATA_NAME="spm-dep-tracker-release-metadata.json"
          OUTPUT_DIR="${RUNNER_TEMP}/dist"
          ARCHIVE_PATH="${OUTPUT_DIR}/v${VERSION}/${ARCHIVE_NAME}"
          METADATA_PATH="${OUTPUT_DIR}/v${VERSION}/${METADATA_NAME}"
          FORMULA_PATH="${RUNNER_TEMP}/tap-formula/spm-dep-tracker.rb"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "metadata_name=${METADATA_NAME}" >> "${GITHUB_OUTPUT}"
          echo "output_dir=${OUTPUT_DIR}" >> "${GITHUB_OUTPUT}"
          echo "archive_path=${ARCHIVE_PATH}" >> "${GITHUB_OUTPUT}"
          echo "metadata_path=${METADATA_PATH}" >> "${GITHUB_OUTPUT}"
          echo "formula_path=${FORMULA_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Guard first publication tag provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; skipping first-publication main-head guard."
            exit 0
          fi

          TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
          MAIN_COMMIT="$(git rev-parse origin/main)"

          [[ "${TAG_COMMIT}" == "${MAIN_COMMIT}" ]] || {
            echo "First publication for ${TAG} is only allowed when the tag points at origin/main HEAD." >&2
            echo "Tag commit: ${TAG_COMMIT}" >&2
            echo "Main HEAD:   ${MAIN_COMMIT}" >&2
            exit 1
          }

      - name: Build release CLI
        run: |
          set -euo pipefail
          bash scripts/prepare_homebrew_release.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --output-dir "${{ steps.meta.outputs.output_dir }}" \
            --formula-out "${{ steps.meta.outputs.formula_path }}"

      - name: Validate rendered formula
        run: |
          set -euo pipefail
          ruby -c "${{ steps.meta.outputs.formula_path }}"
          grep -q '^  url "' "${{ steps.meta.outputs.formula_path }}"
          grep -q '^  sha256 "' "${{ steps.meta.outputs.formula_path }}"

      - name: Validate release archive shape
        run: |
          set -euo pipefail
          ARCHIVE_PATH="${{ steps.meta.outputs.archive_path }}"
          tar -tzf "${ARCHIVE_PATH}" | grep -Fx "spm-dep-tracker"
          EXTRACT_DIR="$(mktemp -d)"
          tar -xzf "${ARCHIVE_PATH}" -C "${EXTRACT_DIR}"
          lipo -archs "${EXTRACT_DIR}/spm-dep-tracker" | grep -Eq 'arm64.*x86_64|x86_64.*arm64'
          "${EXTRACT_DIR}/spm-dep-tracker" --help >/dev/null

      - name: Validate stable formula against local archive
        run: |
          set -euo pipefail

          ARCHIVE_PATH="${{ steps.meta.outputs.archive_path }}"
          TAP_DIR="$(mktemp -d)/homebrew-spmdeptracker-stable"
          mkdir -p "${TAP_DIR}/Formula"

          python3 - <<'PY' "${ARCHIVE_PATH}" "${{ steps.meta.outputs.formula_path }}"
          from pathlib import Path
          import sys

          archive_path = Path(sys.argv[1]).resolve()
          formula_out = Path(sys.argv[2])
          content = formula_out.read_text()
          lines = []
          for line in content.splitlines():
              if line.startswith('  url "https://github.com/'):
                  lines.append(f'  url "file://{archive_path}"')
              else:
                  lines.append(line)
          formula_out.write_text("\n".join(lines) + "\n")
          PY

          cp "${{ steps.meta.outputs.formula_path }}" "${TAP_DIR}/Formula/spm-dep-tracker.rb"

          (
            cd "${TAP_DIR}"
            git init -b main
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git add Formula/spm-dep-tracker.rb
            git commit -m "Add formula"
          )

          brew untap local/spmdeptracker-stable >/dev/null 2>&1 || true
          brew uninstall --force local/spmdeptracker-stable/spm-dep-tracker >/dev/null 2>&1 || true
          brew tap --custom-remote local/spmdeptracker-stable "file://${TAP_DIR}"
          brew install local/spmdeptracker-stable/spm-dep-tracker
          brew test local/spmdeptracker-stable/spm-dep-tracker
          brew uninstall --force local/spmdeptracker-stable/spm-dep-tracker >/dev/null 2>&1 || true
          brew untap local/spmdeptracker-stable >/dev/null 2>&1 || true

      - name: Validate dedicated tap credentials
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN}" ]] || {
            echo "Missing HOMEBREW_TAP_TOKEN secret required to update the dedicated tap repo." >&2
            exit 1
          }

          gh repo view AmrMohamad/homebrew-spm-den-tracker >/dev/null

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ARCHIVE_PATH="${{ steps.meta.outputs.archive_path }}"
          ARCHIVE_NAME="${{ steps.meta.outputs.archive_name }}"
          METADATA_PATH="${{ steps.meta.outputs.metadata_path }}"
          METADATA_NAME="${{ steps.meta.outputs.metadata_name }}"

          [[ -f "${ARCHIVE_PATH}" ]] || {
            echo "Expected archive missing: ${ARCHIVE_PATH}" >&2
            exit 1
          }

          extract_binary_sha() {
            local archive_path="$1"
            local extract_dir

            extract_dir="$(mktemp -d)"
            tar -tzf "${archive_path}" | grep -Fx "spm-dep-tracker" >/dev/null
            tar -xzf "${archive_path}" -C "${extract_dir}"
            shasum -a 256 "${extract_dir}/spm-dep-tracker" | awk '{print $1}'
            rm -rf "${extract_dir}"
          }

          read_metadata_field() {
            local metadata_path="$1"
            local field="$2"

            python3 - <<'PY' "${metadata_path}" "${field}"
          import json
          import sys

          metadata_path, field = sys.argv[1:]
          with open(metadata_path, "r", encoding="utf-8") as handle:
              data = json.load(handle)

          value = data.get(field)
          if value is None:
              raise SystemExit(1)

          print(value)
          PY
          }

          TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
          LOCAL_BINARY_SHA="$(extract_binary_sha "${ARCHIVE_PATH}")"
          python3 - <<'PY' "${METADATA_PATH}" "${TAG}" "${TAG_COMMIT}" "${LOCAL_BINARY_SHA}" "${ARCHIVE_NAME}"
          import json
          import sys
          from pathlib import Path

          metadata_path, tag, tag_commit_sha, binary_sha256, archive_name = sys.argv[1:]
          payload = {
              "tag": tag,
              "tag_commit_sha": tag_commit_sha,
              "binary_sha256": binary_sha256,
              "archive_name": archive_name,
          }
          path = Path(metadata_path)
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

          if gh release view "${TAG}" >/dev/null 2>&1; then
            ASSET_NAMES="$(gh release view "${TAG}" --json assets --jq '.assets[].name')"
            ARCHIVE_PRESENT=0
            METADATA_PRESENT=0

            if printf '%s\n' "${ASSET_NAMES}" | grep -Fx "${ARCHIVE_NAME}" >/dev/null; then
              ARCHIVE_PRESENT=1
            fi

            if printf '%s\n' "${ASSET_NAMES}" | grep -Fx "${METADATA_NAME}" >/dev/null; then
              METADATA_PRESENT=1
              DOWNLOAD_DIR="$(mktemp -d)"
              gh release download "${TAG}" \
                --pattern "${METADATA_NAME}" \
                --dir "${DOWNLOAD_DIR}" \
                --clobber

              PUBLISHED_TAG_COMMIT="$(read_metadata_field "${DOWNLOAD_DIR}/${METADATA_NAME}" tag_commit_sha)"
              [[ "${PUBLISHED_TAG_COMMIT}" == "${TAG_COMMIT}" ]] || {
                echo "Release ${TAG} was already published from commit ${PUBLISHED_TAG_COMMIT}, but the current tag points to ${TAG_COMMIT}. Refusing to mutate a moved release tag." >&2
                exit 1
              }

              PUBLISHED_METADATA_BINARY_SHA="$(read_metadata_field "${DOWNLOAD_DIR}/${METADATA_NAME}" binary_sha256)"
              [[ "${PUBLISHED_METADATA_BINARY_SHA}" == "${LOCAL_BINARY_SHA}" ]] || {
                echo "Published release metadata binary checksum ${PUBLISHED_METADATA_BINARY_SHA} does not match local build binary checksum ${LOCAL_BINARY_SHA}." >&2
                exit 1
              }
            fi

            if [[ "${ARCHIVE_PRESENT}" -eq 1 ]]; then
              DOWNLOAD_DIR="$(mktemp -d)"
              gh release download "${TAG}" \
                --pattern "${ARCHIVE_NAME}" \
                --dir "${DOWNLOAD_DIR}" \
                --clobber

              PUBLISHED_BINARY_SHA="$(extract_binary_sha "${DOWNLOAD_DIR}/${ARCHIVE_NAME}")"
              [[ "${PUBLISHED_BINARY_SHA}" == "${LOCAL_BINARY_SHA}" ]] || {
                echo "Published asset binary checksum ${PUBLISHED_BINARY_SHA} does not match local build binary checksum ${LOCAL_BINARY_SHA}." >&2
                exit 1
              }
            fi

            if [[ "${ARCHIVE_PRESENT}" -eq 0 ]]; then
              gh release upload "${TAG}" "${ARCHIVE_PATH}"
            fi

            if [[ "${METADATA_PRESENT}" -eq 0 ]]; then
              gh release upload "${TAG}" "${METADATA_PATH}"
            fi

            echo "Release ${TAG} already exists with the expected payload and provenance; continuing without mutation."
            exit 0
          fi

          gh release create "${TAG}" "${ARCHIVE_PATH}" "${METADATA_PATH}" \
            --title "${TAG}" \
            --notes "Release ${TAG}"

      - name: Sync dedicated Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/sync_homebrew_tap.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --source-owner AmrMohamad \
            --source-repo spm-den-tracker \
            --tap-owner AmrMohamad \
            --tap-repo homebrew-spm-den-tracker \
            --archive-name "${{ steps.meta.outputs.archive_name }}"

      - name: Verify published release integrity
        env:
          # This verifier reads the source-repo release API and the public tap path.
          # Reserve HOMEBREW_TAP_TOKEN for the actual tap sync step only.
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail
          bash scripts/verify_published_homebrew_release.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --brew-install-canary
