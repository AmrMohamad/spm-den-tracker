name: Release Homebrew

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-homebrew-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Derive release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="spm-dep-tracker-macos.tar.gz"
          OUTPUT_DIR="${RUNNER_TEMP}/dist"
          ARCHIVE_PATH="${OUTPUT_DIR}/v${VERSION}/${ARCHIVE_NAME}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "output_dir=${OUTPUT_DIR}" >> "${GITHUB_OUTPUT}"
          echo "archive_path=${ARCHIVE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Build release CLI
        run: swift build -c release --product spm-dep-tracker

      - name: Prepare Homebrew release artifact
        run: |
          set -euo pipefail
          bash scripts/prepare_homebrew_release.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --skip-build \
            --output-dir "${{ steps.meta.outputs.output_dir }}"

      - name: Validate rewritten formula
        run: |
          set -euo pipefail
          ruby -c Formula/spm-dep-tracker.rb
          git diff --check

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ARCHIVE_PATH="${{ steps.meta.outputs.archive_path }}"

          [[ -f "${ARCHIVE_PATH}" ]] || {
            echo "Expected archive missing: ${ARCHIVE_PATH}" >&2
            exit 1
          }

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ARCHIVE_PATH}" --clobber
          else
            gh release create "${TAG}" "${ARCHIVE_PATH}" \
              --title "${TAG}" \
              --notes "Release ${TAG}"
          fi

      - name: Open formula stabilization PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/release-formula-v${{ steps.meta.outputs.version }}
          delete-branch: true
          commit-message: "[Enhance]: stabilize Homebrew formula for v${{ steps.meta.outputs.version }}"
          title: Stabilize Homebrew formula for v${{ steps.meta.outputs.version }}
          body: |
            ## Summary

            - switch the Homebrew formula from `HEAD`-only to stable+head for `v${{ steps.meta.outputs.version }}`
            - point the stable install path at the uploaded GitHub release asset
            - preserve `HEAD` installs for maintainers

            ## Validation

            - generated by `.github/workflows/release-homebrew.yml`
            - `ruby -c Formula/spm-dep-tracker.rb`
            - `git diff --check`
          signoff: false
