name: Homebrew Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  formula:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Validate formula syntax
        run: |
          set -euo pipefail
          ruby -c Formula/spm-dep-tracker.rb
          git diff --check

      - name: Detect formula install mode
        id: mode
        run: |
          set -euo pipefail
          if grep -q '^  url "' Formula/spm-dep-tracker.rb; then
            echo "install_mode=stable" >> "${GITHUB_OUTPUT}"
          else
            echo "install_mode=head" >> "${GITHUB_OUTPUT}"
          fi

      - name: Note head-only validation limitation
        if: steps.mode.outputs.install_mode == 'head'
        run: |
          set -euo pipefail
          echo "Skipping blocking Homebrew HEAD install validation on GitHub-hosted runners."
          echo "Current runner toolchains hit a Swift 6.2.3/Xcode 26.2 incompatibility in swift-argument-parser."
          echo "Stable release-backed formulas remain fully validated through the temporary tap path."

      - name: Install stable formula through a temporary local tap
        if: steps.mode.outputs.install_mode == 'stable'
        run: |
          set -euo pipefail

          brew untap local/spmdeptracker >/dev/null 2>&1 || true
          TAP_DIR="$(mktemp -d)/homebrew-spmdeptracker"
          mkdir -p "${TAP_DIR}/Formula"
          cp Formula/spm-dep-tracker.rb "${TAP_DIR}/Formula/"

          (
            cd "${TAP_DIR}"
            git init -b main
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git add Formula/spm-dep-tracker.rb
            git commit -m "Add formula"
          )

          brew tap --custom-remote local/spmdeptracker "file://${TAP_DIR}"
          brew install local/spmdeptracker/spm-dep-tracker
          brew test local/spmdeptracker/spm-dep-tracker

      - name: Cleanup temporary tap
        if: always()
        run: |
          brew uninstall --force local/spmdeptracker/spm-dep-tracker || true
          brew untap local/spmdeptracker || true
