name: Homebrew Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  formula:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Validate formula syntax
        run: |
          set -euo pipefail
          ruby -c Formula/spm-dep-tracker.rb
          git diff --check

      - name: Install through a temporary local tap
        run: |
          set -euo pipefail

          brew untap local/spmdeptracker >/dev/null 2>&1 || true
          TAP_DIR="$(mktemp -d)/homebrew-spmdeptracker"
          mkdir -p "${TAP_DIR}/Formula"
          cp Formula/spm-dep-tracker.rb "${TAP_DIR}/Formula/"

          (
            cd "${TAP_DIR}"
            git init -b main
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git add Formula/spm-dep-tracker.rb
            git commit -m "Add formula"
          )

          brew tap --custom-remote local/spmdeptracker "file://${TAP_DIR}"
          brew install --HEAD local/spmdeptracker/spm-dep-tracker
          brew test local/spmdeptracker/spm-dep-tracker

      - name: Cleanup temporary tap
        if: always()
        run: |
          brew uninstall --force local/spmdeptracker/spm-dep-tracker || true
          brew untap local/spmdeptracker || true
