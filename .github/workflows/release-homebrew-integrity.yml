name: Verify Published Homebrew Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix. Defaults to the latest stable release."
        required: false
        type: string
      brew_canary:
        description: "Run brew install/test against the published public tap path."
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION_INPUT="${{ inputs.version }}"
          if [[ -n "${VERSION_INPUT}" ]]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="$(gh release list \
              --repo AmrMohamad/spm-den-tracker \
              --exclude-drafts \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName' | sed 's/^v//')"
          fi

          [[ -n "${VERSION}" ]] || {
            echo "Could not determine a release version to verify." >&2
            exit 1
          }

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Verify published release integrity
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail
          bash scripts/verify_published_homebrew_release.sh \
            --version "${{ steps.version.outputs.version }}"

      - name: Run brew install canary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.brew_canary }}
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail
          bash scripts/verify_published_homebrew_release.sh \
            --version "${{ steps.version.outputs.version }}" \
            --brew-install-canary
